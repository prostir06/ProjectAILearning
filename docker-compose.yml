# Docker Compose для локального запуску.
# Streamlit (порт 8501): docker compose up --build
# Flask (порт 5000):     docker compose --profile flask up --build
services:
  streamlit:
    build: .
    ports:
      - "8501:8501"
    restart: unless-stopped

  flask:
    build: .
    # HOST=0.0.0.0 — слухати всі інтерфейси всередині контейнера.
    command: ["python", "app.py"]
    environment:
      HOST: 0.0.0.0
      PORT: "5000"
      FLASK_DEBUG: "0"
    ports:
      - "5000:5000"
    restart: unless-stopped
    profiles:
      - flask
