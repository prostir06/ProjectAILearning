services:
  streamlit:
    build: .
    ports:
      - "8501:8501"
    restart: unless-stopped

  flask:
    build: .
    command: ["python", "app.py"]
    environment:
      HOST: 0.0.0.0
      PORT: "5000"
      FLASK_DEBUG: "0"
    ports:
      - "5000:5000"
    restart: unless-stopped
    profiles:
      - flask
